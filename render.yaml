services:
  - type: web
    name: eepargne-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:create_app()"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eepargne-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: COMMISSION_RATE
        value: "0.01"
      - key: PARRAINAGE_BONUS_RATE
        value: "0.02"

databases:
  - name: eepargne-db
    databaseName: eepargne_db
    user: eepargne_user
    plan: free
